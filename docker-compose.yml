version: '3.8'

services:
  # Main Tempest InfluxDB publisher service
  tempest-publisher:
    build: .
    container_name: tempest-influxdb-publisher
    network_mode: host
    environment:
      - TEMPEST_PROTOCOL=tcp
      - TEMPEST_TCP_PORT=50222
      - TEMPEST_PUBLISH_INTERVAL=60
      - TEMPEST_DEBUG=false
      - INFLUXDB_URL=http://localhost:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INFLUXDB_ORG=home
      - INFLUXDB_BUCKET=tempest
      - INFLUXDB_MEASUREMENT=weather
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "/app/main.py", "--help"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Service with UDP mode
  tempest-publisher-udp:
    build: .
    container_name: tempest-influxdb-publisher-udp
    network_mode: host
    environment:
      - TEMPEST_PROTOCOL=udp
      - TEMPEST_UDP_PORT=50222
      - TEMPEST_PUBLISH_INTERVAL=60
      - TEMPEST_DEBUG=false
      - INFLUXDB_URL=http://localhost:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INFLUXDB_ORG=home
      - INFLUXDB_BUCKET=tempest
      - INFLUXDB_MEASUREMENT=weather
    restart: unless-stopped
    profiles:
      - udp

  # Service for testing with debug enabled
  tempest-publisher-test:
    build: .
    container_name: tempest-influxdb-publisher-test
    network_mode: host
    environment:
      - TEMPEST_PROTOCOL=tcp
      - TEMPEST_TCP_PORT=50222
      - TEMPEST_PUBLISH_INTERVAL=10
      - TEMPEST_DEBUG=true
      - INFLUXDB_URL=http://localhost:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INFLUXDB_ORG=home
      - INFLUXDB_BUCKET=tempest
      - INFLUXDB_MEASUREMENT=weather
    restart: "no"
    profiles:
      - test

  # Full stack with InfluxDB included
  influxdb:
    image: influxdb:2.7
    container_name: tempest-influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD:-tempest123}
      - DOCKER_INFLUXDB_INIT_ORG=home
      - DOCKER_INFLUXDB_INIT_BUCKET=tempest
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN}
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    restart: unless-stopped
    profiles:
      - full-stack

  # Tempest publisher that connects to the bundled InfluxDB
  tempest-publisher-full:
    build: .
    container_name: tempest-influxdb-publisher-full
    network_mode: host
    environment:
      - TEMPEST_PROTOCOL=tcp
      - TEMPEST_TCP_PORT=50222
      - TEMPEST_PUBLISH_INTERVAL=60
      - TEMPEST_DEBUG=false
      - INFLUXDB_URL=http://localhost:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INFLUXDB_ORG=home
      - INFLUXDB_BUCKET=tempest
      - INFLUXDB_MEASUREMENT=weather
    depends_on:
      - influxdb
    restart: unless-stopped
    profiles:
      - full-stack

volumes:
  influxdb-data:
  influxdb-config:
